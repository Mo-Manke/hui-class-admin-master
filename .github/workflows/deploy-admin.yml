name: Deploy Admin

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: master
      app_root:
        description: Remote app root
        required: true
        default: /www/wwwroot/hui-class-admin
      site_dir:
        description: Remote static site directory
        required: true
        default: /www/wwwroot/hui-class-admin/www

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:prod

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          envs: APP_ROOT,SITE_DIR
          script: |
            mkdir -p "${APP_ROOT}/deploy-dist" "${SITE_DIR}"
        env:
          APP_ROOT: ${{ github.event.inputs.app_root }}
          SITE_DIR: ${{ github.event.inputs.site_dir }}

      - name: Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: dist/*
          target: ${{ github.event.inputs.app_root }}/deploy-dist

      - name: Publish dist
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          envs: APP_ROOT,SITE_DIR
          script: |
            find "${SITE_DIR}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -R "${APP_ROOT}/deploy-dist"/. "${SITE_DIR}/"
            find "${APP_ROOT}/deploy-dist" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        env:
          APP_ROOT: ${{ github.event.inputs.app_root }}
          SITE_DIR: ${{ github.event.inputs.site_dir }}
